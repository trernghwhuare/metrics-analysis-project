[workspace]
name = "network-metrics-package"
version = "0.1.0"
description = "A comprehensive Python framework for analyzing complex networks using graph theory metrics"
authors = ["Hua Cheng <trernghwhuare@aliyun.com>"]
channels = ["conda-forge"]
# graph-tool is primarily available on linux-64 and osx-64, limit platforms accordingly
platforms = ["linux-64", "osx-64"]

[dependencies]
python = ">=3.8,<3.12"
graph-tool = ">=2.55"
numpy = ">=1.19.0"
scipy = ">=1.7.0"
pandas = ">=1.3.0"
matplotlib = ">=3.4.0"
seaborn = ">=0.11.0"
networkx = ">=2.6.0"
tqdm = ">=4.62.0"
mystmd = ">=1.8.2,<2"
pycairo = ">=1.29.0,<2"
jupyter-book = ">=2.1.4,<3"
myst-parser = ">=5.0.0,<6"
sphinx = ">=9.0.4,<10"

[feature.test]
dependencies = { pytest = ">=6.2.0", pytest-cov = ">=2.12.0" }

[feature.dev]
dependencies = { black = ">=21.0.0", flake8 = ">=3.9.0" }

[environments]
default = { features = ["test", "dev"], solve-group = "default" }

[tasks]
test = "pytest tests/"
build-docs = "npx myst build"
analyze = "python analyze_networks_metrics.py"
notebook = "jupyter notebook --no-browser Network_Metrics_Analysis.ipynb"

[pypi-dependencies]
pyneuroml = ">=1.3.21, <2"
