# Read the Docs configuration file v2
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
    nodejs: "20"
  commands:
    - npm install
    - npx myst build --html
    - mkdir -p $READTHEDOCS_OUTPUT/html/
    - cp -r _build/html/* $READTHEDOCS_OUTPUT/html/

python:
  install:
    - requirements: docs-requirements.txt

formats:
  - pdf
  - epub