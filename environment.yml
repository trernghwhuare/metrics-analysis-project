name: metrics-analysis-docs
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.11
  
  # Core scientific computing
  - numpy>=1.19.0
  - scipy>=1.7.0
  - pandas>=1.3.0
  
  # Visualization
  - matplotlib>=3.4.0
  - seaborn>=0.11.0
  
  # Network analysis (graph-tool is only available via conda-forge)
  - graph-tool>=2.55
  - networkx>=2.6.0
  
  # Additional utilities
  - tqdm>=4.62.0
  
  # Jupyter Book and documentation dependencies
  - jupyter-book>=0.13.0
  - myst-parser>=0.18.0
  - sphinx>=5.0.0
  
  # For Cairo backend support in matplotlib
  - pycairo
  
  # Pip dependencies (if any additional packages are needed)
  - pip
  - pip:
    - mystmd>=1.8.2